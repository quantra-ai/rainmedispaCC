<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add your card — Rain Medi Spa & Salon</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:#f4f1ee; color:#2c2c2a; display:flex; min-height:100vh;
           align-items:flex-start; justify-content:center; padding:24px; }
    .card { background:#fff; border-radius:16px; padding:28px 24px; max-width:440px;
            width:100%; box-shadow:0 2px 12px rgba(0,0,0,.06); }
    h1 { font-size:20px; font-weight:500; margin:0 0 6px; text-align:center; }
    .sub { font-size:14px; line-height:1.5; color:#5f5e5a; margin:0 0 18px; text-align:center; }
    #booker-cc-widget-container { min-height:120px; }
    #status { font-size:13px; color:#5f5e5a; margin-top:14px; text-align:center; word-break:break-word; }
    button { margin-top:16px; width:100%; padding:13px; border:0; border-radius:10px;
             background:#1d9e75; color:#fff; font-size:15px; font-weight:500; cursor:pointer; }
    button:disabled { background:#b4b2a9; cursor:default; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add your card on file</h1>
    <p class="sub">To confirm your appointment at Rain Medi Spa &amp; Salon, please enter your card below.</p>
    <div id="booker-cc-widget-container"></div>
    <button id="submitBtn" disabled>Save card</button>
    <div id="status">Loading…</div>
  </div>

  <script type="text/javascript" src="https://ccwidget.secure-booker.com/cc-widget-beacon.js"></script>
  <script>
    const SUPABASE_URL = "https://ijcfzgghwmpmyvhggpas.supabase.co";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqY2Z6Z2dod21wbXl2aGdncGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjEwNzUsImV4cCI6MjA5Nzk5NzA3NX0.HQADESG-hIFyMHNHJS4tFt7ikvaDcAC0Aa6NOarwn78";

    const t = new URLSearchParams(location.search).get("t");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("submitBtn");

    function setStatus(msg) { statusEl.textContent = msg; }

    async function getRow() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_capture`, {
        method: "POST",
        headers: { "apikey": ANON_KEY, "Authorization": "Bearer " + ANON_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ p_token: t })
      });
      const rows = await res.json();
      return Array.isArray(rows) && rows.length ? rows[0] : null;
    }

    async function init() {
      if (!t) { setStatus("Invalid link."); return; }
      let row;
      try { row = await getRow(); } catch (e) { setStatus("Could not load your details."); return; }
      if (!row) { setStatus("This link is invalid or expired."); return; }

      if (!window.ccWidgetBeacon) { setStatus("Card form failed to load. Please contact the spa."); return; }

      try {
        window.ccWidgetBeacon.loadWidget({
          spaId: Number(row.location_id),
          customerId: Number(row.booker_customer_id),
          getClientToken: () => Promise.resolve(row.widget_token),
          onEvent: (data) => {
            console.log("widget event", data);
            setStatus("Widget event: " + JSON.stringify(data));
          }
        });
        setStatus("Card form ready.");
        btn.disabled = false;
      } catch (e) {
        setStatus("Widget error: " + (e && e.message ? e.message : e));
      }
    }

    btn.addEventListener("click", () => {
      try { window.ccWidgetBeacon.submitForm(); setStatus("Submitting card…"); }
      catch (e) { setStatus("Submit error: " + (e && e.message ? e.message : e)); }
    });

    init();
  </script>
</body>
</html>
