<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add your card — Rain Medi Spa & Salon</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:#f4f1ee; color:#2c2c2a; display:flex; min-height:100vh;
           align-items:center; justify-content:center; padding:20px; }
    .card { background:#fff; border-radius:16px; padding:32px 28px; max-width:380px;
            width:100%; box-shadow:0 2px 12px rgba(0,0,0,.06); text-align:center; }
    h1 { font-size:20px; font-weight:500; margin:0 0 8px; }
    p { font-size:15px; line-height:1.6; color:#5f5e5a; margin:0 0 20px; }
    .field { background:#f4f1ee; border-radius:10px; padding:12px 14px; font-size:14px;
             margin-top:10px; text-align:left; }
    .label { color:#888780; font-size:12px; }
    .val { font-weight:500; word-break:break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add your card on file</h1>
    <p id="status">Loading…</p>
    <div class="field"><span class="label">Customer ID</span><br><span class="val" id="cid">—</span></div>
    <div class="field"><span class="label">Card setup status</span><br><span class="val" id="cstatus">—</span></div>
  </div>
  <script>
    const SUPABASE_URL = "https://ijcfzgghwmpmyvhggpas.supabase.co";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqY2Z6Z2dod21wbXl2aGdncGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjEwNzUsImV4cCI6MjA5Nzk5NzA3NX0.HQADESG-hIFyMHNHJS4tFt7ikvaDcAC0Aa6NOarwn78";

    const t = new URLSearchParams(location.search).get("t");

    async function load() {
      if (!t) { document.getElementById("status").textContent = "Invalid link."; return; }
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_capture`, {
          method: "POST",
          headers: {
            "apikey": ANON_KEY,
            "Authorization": "Bearer " + ANON_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ p_token: t })
        });
        const rows = await res.json();
        if (!Array.isArray(rows) || rows.length === 0) {
          document.getElementById("status").textContent = "This link is invalid or expired.";
          return;
        }
        const row = rows[0];
        document.getElementById("status").textContent = "Link verified.";
        document.getElementById("cid").textContent = row.booker_customer_id || "missing";
        document.getElementById("cstatus").textContent = row.status || "—";
      } catch (e) {
        document.getElementById("status").textContent = "Something went wrong loading this page.";
      }
    }
    load();
  </script>
</body>
</html>
