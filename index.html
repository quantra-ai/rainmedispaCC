<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add your card — Rain Medi Spa & Salon</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:#f4f1ee; color:#2c2c2a; display:flex; min-height:100vh;
           align-items:center; justify-content:center; padding:20px; }
    .card { background:#fff; border-radius:16px; padding:32px 28px; max-width:380px;
            width:100%; box-shadow:0 2px 12px rgba(0,0,0,.06); text-align:center; }
    h1 { font-size:20px; font-weight:500; margin:0 0 8px; }
    p { font-size:15px; line-height:1.6; color:#5f5e5a; margin:0 0 20px; }
    .field { background:#f4f1ee; border-radius:10px; padding:12px 14px; font-size:14px;
             margin-top:10px; text-align:left; }
    .label { color:#888780; font-size:12px; }
    .val { font-weight:500; word-break:break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add your card on file</h1>
    <p>To confirm your appointment at Rain Medi Spa &amp; Salon, please add a card. (Setup in progress.)</p>
    <div class="field"><span class="label">Customer ID</span><br><span class="val" id="cid">—</span></div>
    <div class="field"><span class="label">Location</span><br><span class="val" id="loc">—</span></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('cid').textContent = params.get('cid') || 'missing';
    document.getElementById('loc').textContent = params.get('loc') || 'missing';
  </script>
</body>
</html>
